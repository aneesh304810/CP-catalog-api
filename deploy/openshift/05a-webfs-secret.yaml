# =====================================================================
# SMB credentials for the cp-datacatalog webfs mount.
#
# Secrets are namespace-scoped, so even though ODH already has one, the
# catalog namespace needs its OWN. Use the same share credentials.
#
# DO NOT commit real credentials. Create this secret imperatively instead:
#
#   oc create secret generic cp-datacatalog-smb-secret \
#     --namespace <CATALOG_NAMESPACE> \
#     --from-literal=username='<SHARE_USER>' \
#     --from-literal=password='<SHARE_PASSWORD>'
#
# (Optionally include domain:  --from-literal=domain='TESTBBH')
#
# This file is a TEMPLATE showing the required keys; prefer the oc command.
# =====================================================================
apiVersion: v1
kind: Secret
metadata:
  name: cp-datacatalog-smb-secret
  namespace: <CATALOG_NAMESPACE>
  labels: { app: cp-catalog, component: webfs }
type: Opaque
stringData:
  username: "<SHARE_USER>"        # service account with access to the share
  password: "<SHARE_PASSWORD>"
  domain: "TESTBBH"              # AD domain (omit if not required)
